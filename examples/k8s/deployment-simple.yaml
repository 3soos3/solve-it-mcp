apiVersion: apps/v1
kind: Deployment
metadata:
  name: solveit-mcp
  labels:
    app: solveit-mcp
    version: stable
spec:
  replicas: 2
  selector:
    matchLabels:
      app: solveit-mcp
  template:
    metadata:
      labels:
        app: solveit-mcp
        version: stable
    spec:
      containers:
      - name: solveit-mcp
        image: 3soos3/solve-it-mcp:stable
        imagePullPolicy: Always
        
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        
        env:
        # Transport configuration
        - name: MCP_TRANSPORT
          value: "http"
        - name: HTTP_HOST
          value: "0.0.0.0"
        - name: HTTP_PORT
          value: "8000"
        
        # Logging configuration
        - name: LOG_LEVEL
          value: "INFO"
        - name: LOG_FORMAT
          value: "json"
        
        # OpenTelemetry configuration (disabled by default)
        - name: OTEL_ENABLED
          value: "false"
        - name: ENVIRONMENT
          value: "production"
        
        # Kubernetes downward API for pod metadata
        - name: K8S_POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: K8S_NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: K8S_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 512Mi
        
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false

---
apiVersion: v1
kind: Service
metadata:
  name: solveit-mcp
  labels:
    app: solveit-mcp
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: solveit-mcp
