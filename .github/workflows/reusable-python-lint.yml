name: Reusable - Python Linting

# Reusable workflow for Python code quality checks
# Can be called from other workflows to avoid duplication

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version to use'
        required: false
        type: string
        default: '3.12'
      source-path:
        description: 'Path to source code'
        required: false
        type: string
        default: 'src/'
      continue-on-error:
        description: 'Whether to continue on linting errors'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  lint:
    name: Python Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      - name: Run Ruff linter
        run: |
          echo "::group::Ruff Linting"
          ruff check ${{ inputs.source-path }} --output-format=github
          echo "::endgroup::"
        continue-on-error: ${{ inputs.continue-on-error }}

      - name: Run Ruff formatter check
        run: |
          echo "::group::Ruff Format Check"
          ruff format --check ${{ inputs.source-path }}
          echo "::endgroup::"
        continue-on-error: ${{ inputs.continue-on-error }}

      - name: Run MyPy type checker
        run: |
          echo "::group::MyPy Type Checking"
          mypy ${{ inputs.source-path }} --ignore-missing-imports --show-error-codes
          echo "::endgroup::"
        continue-on-error: true  # Type hints may not be complete

      - name: Create summary
        if: always()
        run: |
          echo "## Python Linting Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Python Version**: ${{ inputs.python-version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Source Path**: ${{ inputs.source-path }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Ruff linting completed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Code formatting checked" >> $GITHUB_STEP_SUMMARY
          echo "✅ Type checking completed" >> $GITHUB_STEP_SUMMARY
