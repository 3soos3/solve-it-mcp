name: Docker - PR Validation

# Validates Docker builds on PRs (single-arch for speed)
# Ensures Dockerfile changes work before merging
# Does NOT publish images

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

env:
  DOCKER_REPO: 3soos3/solve-it-mcp

jobs:
  # Job 1: Single-arch Build & Test
  build-and-test:
    name: Build & Test (AMD64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        run: |
          GIT_COMMIT=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "git_commit=${GIT_COMMIT}" >> $GITHUB_OUTPUT
          echo "build_date=${BUILD_DATE}" >> $GITHUB_OUTPUT
          echo "::notice::Building PR commit: ${GIT_COMMIT}"

      - name: Build Docker image (AMD64 only)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ env.DOCKER_REPO }}:pr-${{ github.event.pull_request.number }}
          build-args: |
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            VCS_REF=${{ steps.meta.outputs.git_commit }}
            VERSION=pr-${{ github.event.pull_request.number }}
            SOLVE_IT_SOURCE=github
            SOLVE_IT_VERSION=main
          cache-from: type=gha,scope=pr-validation
          cache-to: type=gha,mode=max,scope=pr-validation

      - name: Test image health checks
        run: |
          echo "::group::Container Health Tests"

          # Run container in background
          docker run -d --name test-container \
            -e MCP_TRANSPORT=http \
            -e HTTP_PORT=8000 \
            -p 8000:8000 \
            ${{ env.DOCKER_REPO }}:pr-${{ github.event.pull_request.number }}

          # Wait for startup
          echo "Waiting for container to start..."
          sleep 15

          # Check if container is running
          if ! docker ps | grep test-container; then
            echo "::error::Container failed to start"
            docker logs test-container
            exit 1
          fi

          # Check logs for errors
          echo "Container logs:"
          docker logs test-container

          # Test health endpoint
          echo "Testing /healthz endpoint..."
          if ! curl -f http://localhost:8000/healthz; then
            echo "::error::/healthz endpoint failed"
            docker logs test-container
            exit 1
          fi

          # Test ready endpoint
          echo "Testing /readyz endpoint..."
          if ! curl -f http://localhost:8000/readyz; then
            echo "::error::/readyz endpoint failed"
            docker logs test-container
            exit 1
          fi

          # Cleanup
          docker stop test-container
          docker rm test-container

          echo "::endgroup::"
          echo "::notice::✅ All health checks passed!"

  # Job 2: Trivy Security Scan
  security-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: false
          outputs: type=docker,dest=/tmp/image.tar
          tags: scan:latest
          cache-from: type=gha,scope=pr-validation

      - name: Install Trivy
        run: |
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Trivy vulnerability scanner (table output)
        run: |
          echo "::group::Trivy Security Scan"
          trivy image \
            --input /tmp/image.tar \
            --format table \
            --severity CRITICAL,HIGH \
            --scanners vuln \
            --vuln-type os,library
          echo "::endgroup::"

      - name: Run Trivy vulnerability scanner (SARIF)
        run: |
          trivy image \
            --input /tmp/image.tar \
            --format sarif \
            --output trivy-results.sarif \
            --severity CRITICAL,HIGH \
            --scanners vuln \
            --vuln-type os,library

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-pr

      - name: Check for CRITICAL vulnerabilities
        run: |
          CRITICAL_COUNT=$(trivy image \
            --input /tmp/image.tar \
            --format json \
            --severity CRITICAL \
            --scanners vuln \
            --vuln-type os,library \
            | jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length')

          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "::error::Found ${CRITICAL_COUNT} CRITICAL vulnerabilities"
            echo "::warning::Please review and address critical vulnerabilities before merging"
            # Don't fail PR, just warn
          else
            echo "::notice::✅ No CRITICAL vulnerabilities found"
          fi

  # Job 3: PR Validation Summary
  pr-summary:
    name: PR Validation Summary
    runs-on: ubuntu-latest
    needs: [build-and-test, security-scan]
    if: always()
    steps:
      - name: Check validation status
        run: |
          if [[ "${{ needs.build-and-test.result }}" != "success" ]]; then
            echo "::error::Docker build or health checks failed"
            exit 1
          fi

          if [[ "${{ needs.security-scan.result }}" != "success" ]]; then
            echo "::warning::Security scan raised concerns - review before merging"
          fi

      - name: Create PR summary
        if: always()
        run: |
          echo "## Docker PR Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build (AMD64) | ${{ needs.build-and-test.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Health Checks | ${{ needs.build-and-test.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan (Trivy) | ${{ needs.security-scan.result == 'success' && '✅ Passed' || '⚠️ Review Required' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*This workflow validates Docker builds without publishing.*" >> $GITHUB_STEP_SUMMARY
          echo "*Images will be built and published when merged to main.*" >> $GITHUB_STEP_SUMMARY
