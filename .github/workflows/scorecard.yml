name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    # Weekly on Monday at 8 AM UTC
    - cron: '0 8 * * 1'
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.1
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@v2.3.1
        with:
          results_file: results.sarif
          results_format: sarif
          # Disable publishing for forks (requires non-fork repo)
          publish_results: false

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3.24.6
        with:
          sarif_file: results.sarif

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4.3.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      - name: Summary
        run: |
          echo "## OpenSSF Scorecard Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View detailed results:" >> $GITHUB_STEP_SUMMARY
          echo "- [Scorecard Dashboard](https://securityscorecards.dev/viewer/?uri=github.com/${{ github.repository }})" >> $GITHUB_STEP_SUMMARY
          echo "- [GitHub Security Tab](https://github.com/${{ github.repository }}/security/code-scanning)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The scorecard evaluates:" >> $GITHUB_STEP_SUMMARY
          echo "- Branch Protection" >> $GITHUB_STEP_SUMMARY
          echo "- Code Review" >> $GITHUB_STEP_SUMMARY
          echo "- Signed Releases" >> $GITHUB_STEP_SUMMARY
          echo "- Dependency Updates" >> $GITHUB_STEP_SUMMARY
          echo "- SAST (Static Analysis)" >> $GITHUB_STEP_SUMMARY
          echo "- Vulnerabilities" >> $GITHUB_STEP_SUMMARY
          echo "- License" >> $GITHUB_STEP_SUMMARY
