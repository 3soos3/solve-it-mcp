# Secret Scanning Custom Patterns
# GitHub will scan for these patterns in addition to built-in secret detection

# Custom patterns for forensic software
paths-ignore:
  - '**/*.md'
  - '**/test/**'
  - '**/tests/**'
  - '**/examples/**'
  - '**/*.example'
  - '**/*.sample'

# Additional patterns (GitHub's built-in patterns will still run)
# These are examples - GitHub secret scanning is enabled via repository settings
