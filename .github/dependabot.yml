# Dependabot configuration for automated dependency updates
# Runs monthly to keep dependencies secure and up-to-date

version: 2
updates:
  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"
      - "security"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    reviewers:
      - "3soos3"
    # Hybrid grouping strategy: security + ecosystem groups
    groups:
      # Group 1: All security updates (highest priority)
      security-updates:
        patterns:
          - "*"
        update-types:
          - "security-update"
      # Group 2: Official GitHub Actions (safe for auto-merge)
      github-actions-safe:
        patterns:
          - "actions/*"
          - "github/*"
        update-types:
          - "patch"
          - "minor"
        exclude-patterns:
          - "actions/upload-artifact"  # Known breaking changes (see PR #35)
      # Group 3: Third-party actions (conservative grouping)
      third-party-actions:
        patterns:
          - "*"
        exclude-patterns:
          - "actions/*"
          - "github/*"
        update-types:
          - "patch"

  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
      - "security"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    reviewers:
      - "3soos3"
    # Group updates by semantic version type
    groups:
      python-patches:
        patterns:
          - "*"
        update-types:
          - "patch"
      python-minor:
        patterns:
          - "*"
        update-types:
          - "minor"

  # Docker dependencies
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
      - "security"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    reviewers:
      - "3soos3"
    # Group Docker base image updates
    groups:
      docker-patches:
        patterns:
          - "*"
        update-types:
          - "patch"
